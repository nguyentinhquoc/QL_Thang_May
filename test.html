<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Năm và Hiển Thị Dữ Liệu</title>
  <style>
    .table {
      width: 50%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .table th, .table td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    .table th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

  <h3>Chọn Năm:</h3>
  <select id="yearSelect">
    <option value="">-- Chọn năm --</option>
  </select>

  <table class="table">
    <tr><th>Năm</th><td id="year">---</td></tr>
    <tr><th>Target</th><td id="target">---</td></tr>
  </table>

  <script>
    const yearSelect = document.getElementById('yearSelect');
    const yearCell = document.getElementById('year');
    const targetCell = document.getElementById('target');

    // ✅ Populate Select Options
    data.forEach(item => {
      const option = document.createElement('option');
      option.value = item.year;
      option.textContent = item.year;
      yearSelect.appendChild(option);
    });

    // ✅ OnChange Event
    yearSelect.addEventListener('change', (e) => {
      const selectedYear = parseInt(e.target.value);
      const selectedData = data.find(item => item.year === selectedYear);

      if (selectedData) {
        yearCell.textContent = selectedData.year;
        targetCell.textContent = selectedData.target;
      } else {
        yearCell.textContent = '---';
        targetCell.textContent = '---';
      }
    });
  </script>
</body>
</html>
